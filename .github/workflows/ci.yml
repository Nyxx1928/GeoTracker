name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Laravel tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [8.4]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, bcmath, xml, ctype, json, openssl

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        working-directory: backend/laravel-backend
        run: composer install --no-progress --no-suggest --prefer-dist --no-interaction

      - name: Prepare environment
        run: |
          if [ -f backend/laravel-backend/.env.example ]; then cp backend/laravel-backend/.env.example backend/laravel-backend/.env; fi
        shell: bash

      - name: Generate app key
        working-directory: backend/laravel-backend
        run: php artisan key:generate --no-interaction || true

      - name: Run PHP unit tests
        working-directory: backend/laravel-backend
        run: vendor/bin/phpunit --configuration phpunit.xml || true

  frontend:
    name: Frontend — Node tests and build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test --if-present --silent || true

      - name: Build frontend
        working-directory: frontend
        run: npm run build --if-present
