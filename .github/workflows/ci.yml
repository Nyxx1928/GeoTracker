name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phase1_lint_validate:
    name: Phase 1 - Lint, validate, and sanitize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, xml, ctype, json, openssl, pdo_mysql

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Determine Composer cache directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir --global 2>/dev/null || echo \"$HOME/.cache/composer\")" >> "$GITHUB_OUTPUT"

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install backend PHP dependencies
        working-directory: backend
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Install backend Node dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Sanitize - Check for secrets
        shell: bash
        run: |
          echo "Checking for potential secrets in code..."
          if grep -r -E "(PASSWORD|SECRET|API_KEY|TOKEN|CREDENTIAL)\s*=\s*['\"][a-zA-Z0-9+/=]{16,}" \
            --include="*.php" --include="*.ts" --include="*.js" --include="*.tsx" --include="*.jsx" \
            --exclude-dir={node_modules,.git,vendor,dist,build,__tests__} \
            --exclude="*.test.ts" --exclude="*.test.js" --exclude="*.spec.ts" --exclude="*.spec.js" \
            --exclude="*.md" --exclude="*example*" \
            backend/ frontend/ 2>/dev/null; then
            echo "Potential hardcoded secrets found"
            exit 1
          fi
          echo "No hardcoded secrets detected"

      - name: Sanitize - Check for sensitive files
        shell: bash
        run: |
          echo "Checking for sensitive files..."
          SENSITIVE_FILES=".env .env.local .env.production id_rsa id_dsa .pem .key"
          for file in $SENSITIVE_FILES; do
            if find . -name "$file" -not -path "*/node_modules/*" -not -path "*/vendor/*" -not -path "*/.git/*" | grep -q .; then
              echo "Found sensitive file: $file"
              exit 1
            fi
          done
          echo "No sensitive files found"

      - name: Sanitize - Validate package and composer integrity
        shell: bash
        run: |
          echo "Validating package.json files..."
          find . -name "package.json" -not -path "*/node_modules/*" -exec node -e "try { JSON.parse(require('fs').readFileSync('{}', 'utf8')); } catch(e) { console.error('Invalid JSON in {}'); process.exit(1); }" \;
          echo "Validating composer.json..."
          cd backend
          composer validate --no-check-publish --strict
          echo "Dependency manifests are valid"

      - name: Sanitize - Check for unsafe input handling
        shell: bash
        run: |
          echo "Checking for unsafe input handling patterns..."
          UNSAFE_PATTERNS=0

          if grep -r -E "\beval\(" --include="*.php" --include="*.ts" --include="*.js" --exclude-dir={node_modules,vendor,.git,dist,build} backend/ frontend/ 2>/dev/null; then
            echo "eval() usage detected"
            UNSAFE_PATTERNS=$((UNSAFE_PATTERNS + 1))
          fi

          if grep -r -E "\.innerHTML\s*=" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" --exclude-dir={node_modules,.git,dist,build} frontend/ 2>/dev/null; then
            echo "innerHTML usage detected"
            UNSAFE_PATTERNS=$((UNSAFE_PATTERNS + 1))
          fi

          if grep -r "dangerouslySetInnerHTML" --include="*.tsx" --include="*.jsx" --exclude-dir={node_modules,.git,dist,build} frontend/ 2>/dev/null | grep -v "DOMPurify\|sanitize"; then
            echo "dangerouslySetInnerHTML without sanitization detected"
            UNSAFE_PATTERNS=$((UNSAFE_PATTERNS + 1))
          fi

          if [ $UNSAFE_PATTERNS -gt 0 ]; then
            echo "Found $UNSAFE_PATTERNS unsafe input handling pattern(s)"
            exit 1
          fi
          echo "No unsafe input handling patterns detected"

      - name: Lint backend PHP formatting (Pint)
        working-directory: backend
        run: php vendor/bin/pint --test

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build backend assets
        working-directory: backend
        run: npm run build

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  phase2_unit_testing:
    name: Phase 2 - Unit testing
    runs-on: ubuntu-latest
    needs: phase1_lint_validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, xml, ctype, json, openssl, pdo_mysql

      - name: Determine Composer cache directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir --global 2>/dev/null || echo \"$HOME/.cache/composer\")" >> "$GITHUB_OUTPUT"

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Prepare environment
        shell: bash
        run: |
          cp backend/.env.example backend/.env
          {
            echo "APP_ENV=testing"
            echo "DB_CONNECTION=sqlite"
            echo "DB_DATABASE=:memory:"
          } >> backend/.env

      - name: Generate app key
        working-directory: backend
        run: php artisan key:generate --no-interaction

      - name: Run backend unit tests
        working-directory: backend
        run: php artisan test --testsuite=Unit

  phase3_integration_testing:
    name: Phase 3 - Integration testing
    runs-on: ubuntu-latest
    needs: phase2_unit_testing
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: geotracker_test
      DB_USERNAME: root
      DB_PASSWORD: root
      APP_ENV: testing
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: geotracker_test
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: geouser
          MYSQL_PASSWORD: geopass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, xml, ctype, json, openssl, pdo_mysql

      - name: Determine Composer cache directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir --global 2>/dev/null || echo \"$HOME/.cache/composer\")" >> "$GITHUB_OUTPUT"

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Prepare environment
        shell: bash
        run: |
          cp backend/.env.example backend/.env
          {
            echo "APP_ENV=testing"
            echo "DB_CONNECTION=mysql"
            echo "DB_HOST=127.0.0.1"
            echo "DB_PORT=3306"
            echo "DB_DATABASE=geotracker_test"
            echo "DB_USERNAME=root"
            echo "DB_PASSWORD=root"
          } >> backend/.env

      - name: Generate app key
        working-directory: backend
        run: php artisan key:generate --no-interaction

      - name: Run database migrations
        working-directory: backend
        run: php artisan migrate --force

      - name: Run backend integration tests
        working-directory: backend
        run: php artisan test --testsuite=Feature

  phase4_e2e_playwright:
    name: Phase 4 - E2E (Playwright)
    runs-on: ubuntu-latest
    needs: phase3_integration_testing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate Playwright setup
        id: pw-setup
        shell: bash
        run: |
          if [ -f frontend/playwright.config.ts ] && [ -d frontend/tests ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Playwright setup detected"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Playwright setup not found in frontend/. Skipping E2E execution."
          fi

      - name: Install Playwright browsers
        if: steps.pw-setup.outputs.available == 'true'
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        if: steps.pw-setup.outputs.available == 'true'
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always() && steps.pw-setup.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  phase5_test_build_docker:
    name: Phase 5 - Test and build Docker
    runs-on: ubuntu-latest
    needs: phase4_e2e_playwright
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker configuration files
        shell: bash
        run: |
          test -f backend/Dockerfile
          if [ -f docker-compose.yml ]; then
            echo "docker-compose.yml found"
          else
            echo "docker-compose.yml not found at repo root. Compose validation will be skipped."
          fi
          if [ -f frontend/Dockerfile ]; then
            echo "frontend/Dockerfile found"
          else
            echo "frontend/Dockerfile not found. Frontend image build will be skipped."
          fi

      - name: Validate Docker Compose
        if: hashFiles('docker-compose.yml') != ''
        run: docker compose config

      - name: Start Docker services
        if: hashFiles('docker-compose.yml') != ''
        run: docker compose up -d

      - name: Verify Docker services are running
        if: hashFiles('docker-compose.yml') != ''
        run: docker compose ps

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t jlabs3/backend:ci backend

      - name: Build frontend image
        if: hashFiles('frontend/Dockerfile') != ''
        run: docker build -f frontend/Dockerfile -t jlabs3/frontend:ci frontend

      - name: Stop Docker services
        if: always() && hashFiles('docker-compose.yml') != ''
        run: docker compose down -v

  phase6_security_scan:
    name: Phase 6 - Security scan
    runs-on: ubuntu-latest
    needs: phase5_test_build_docker
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft version

      - name: Generate SBOM (dependencies)
        run: syft dir:. -o spdx-json=sbom-dependencies.spdx.json

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy --version

      - name: Trivy vulnerability scan
        run: |
          trivy fs --scanners vuln --severity CRITICAL --ignore-unfixed --exit-code 1 .
          trivy fs --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed --format table --output trivy-report.txt .

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Verify Cosign install
        run: cosign version

      - name: Cosign authenticator (keyless sign and verify)
        if: github.event_name == 'push'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob --yes --output-signature sbom.sig --output-certificate sbom.pem sbom-dependencies.spdx.json
          cosign verify-blob \
            --certificate sbom.pem \
            --signature sbom.sig \
            --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/ci.yml@.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            sbom-dependencies.spdx.json

      - name: Skip Cosign keyless signing on PR
        if: github.event_name != 'push'
        run: echo "Cosign keyless sign/verify runs on push events only."

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-artifacts
          path: |
            sbom-dependencies.spdx.json
            trivy-report.txt
            sbom.sig
            sbom.pem
          if-no-files-found: ignore

  phase7_ci_summary:
    name: Phase 7 - CI summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - phase1_lint_validate
      - phase2_unit_testing
      - phase3_integration_testing
      - phase4_e2e_playwright
      - phase5_test_build_docker
      - phase6_security_scan
    steps:
      - name: Generate summary
        env:
          PHASE1: ${{ needs.phase1_lint_validate.result }}
          PHASE2: ${{ needs.phase2_unit_testing.result }}
          PHASE3: ${{ needs.phase3_integration_testing.result }}
          PHASE4: ${{ needs.phase4_e2e_playwright.result }}
          PHASE5: ${{ needs.phase5_test_build_docker.result }}
          PHASE6: ${{ needs.phase6_security_scan.result }}
        shell: bash
        run: |
          {
            echo "## CI Pipeline Summary"
            echo
            echo "| Phase | Result |"
            echo "|---|---|"
            echo "| Phase 1 - Lint and validate | ${PHASE1} |"
            echo "| Phase 2 - Unit testing | ${PHASE2} |"
            echo "| Phase 3 - Integration testing | ${PHASE3} |"
            echo "| Phase 4 - E2E (Playwright) | ${PHASE4} |"
            echo "| Phase 5 - Test and build Docker | ${PHASE5} |"
            echo "| Phase 6 - Security scan | ${PHASE6} |"
          } >> "$GITHUB_STEP_SUMMARY"

          for status in "$PHASE1" "$PHASE2" "$PHASE3" "$PHASE4" "$PHASE5" "$PHASE6"; do
            if [ "$status" != "success" ]; then
              echo "One or more phases failed."
              exit 1
            fi
          done
