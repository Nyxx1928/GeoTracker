services:
  db:
    image: mysql:8.0
    container_name: jlabs3_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: geotracker
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: geouser
      MYSQL_PASSWORD: geopass
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jlabs3_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: geotracker
      DB_USERNAME: geouser
      DB_PASSWORD: geopass

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jlabs3_frontend
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  db_data:
